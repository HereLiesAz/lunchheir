# Lunch Heir version — the single source of truth, auto-maintained by the build.
#
# The version name is  versionMajor.versionMinor.versionPatch.versionBuild
#
#   versionMajor  bumped ONLY by the project owner (manual).
#   versionMinor  bumped by the maintainer (manual, e.g. per release).
#   versionPatch  +1 on EVERY compile; resets to 0 whenever versionMinor changes.
#   versionBuild  +1 on EVERY compile; NEVER resets.
#
# patch/build are rewritten by overlay/lunchheir-overlay.gradle on every Gradle
# build, so they advance no matter where or how the app is compiled. Only edit
# versionMajor / versionMinor by hand. (versionMinorAtLastReset is internal — it
# records the minor at the last patch reset so the build can detect a minor bump.)
versionMajor=1
versionMinor=0
versionPatch=0
versionBuild=0
versionMinorAtLastReset=-1

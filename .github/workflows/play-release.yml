name: Publish to Google Play

# Deliberate Play release: builds the signed Play-flavor release bundle (AAB) and uploads it to the
# Google Play internal track via PLAY_SERVICE_ACCOUNT_JSON. Triggered manually or by a v* tag.
#
# Prerequisites (one-time, on Google's side):
#   - The app (com.hereliesaz.lunchheir.play) must already exist in the Play Console — Google
#     rejects the FIRST upload via API, so the initial bundle must be uploaded manually once.
#   - The service account behind PLAY_SERVICE_ACCOUNT_JSON must have release permission for it.

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to publish to"
        required: true
        default: "internal"
        type: choice
        options: [ "internal", "alpha", "beta", "production" ]
  push:
    tags: [ "v*" ]

concurrency:
  group: play-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  play-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check Play credentials
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_JSON" ]; then
            echo "::error::PLAY_SERVICE_ACCOUNT_JSON is not set — cannot publish to Play."
            exit 1
          fi

      - name: Checkout (with upstream submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Inject ARCore key (if provided)
        env:
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: echo "ARCORE_API_KEY=$ARCORE_API_KEY" >> upstream/local.properties

      - name: Decode signing keystore (required)
        env:
          KEYSTORE_RAW: ${{ secrets.KEYSTORE_RAW }}
        run: |
          if [ -z "$KEYSTORE_RAW" ]; then
            echo "::error::KEYSTORE_RAW is not set — a Play release must be signed."
            exit 1
          fi
          echo "$KEYSTORE_RAW" | base64 -d > "$GITHUB_WORKSPACE/keystore.jks"

      - name: Apply Lunch Heir source overlay
        run: overlay/apply-overlay.sh

      - name: Build signed Play release bundle (AAB)
        working-directory: upstream
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleLawnWithQuickstepPlayRelease --build-cache

      - name: Locate AAB
        id: aab
        run: |
          AAB=$(find upstream/build/outputs/bundle -name "*.aab" | head -n 1)
          if [ -z "$AAB" ]; then echo "::error::No AAB produced."; exit 1; fi
          echo "path=$AAB" >> "$GITHUB_OUTPUT"

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.hereliesaz.lunchheir.play
          releaseFiles: ${{ steps.aab.outputs.path }}
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed

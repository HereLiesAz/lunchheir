name: Auto-update Lawnchair submodule

# Keeps the upstream/ submodule tracking the latest Lawnchair 16-dev. Because the Lunch Heir
# overlay patches upstream source with exact-anchor edits, a bump can only be trusted once the
# overlay still applies AND the app still builds — so this verifies before proposing the bump:
#   green  -> opens/updates a PR with the new submodule pointer (review + one-click merge)
#   red    -> opens an issue naming the stage that broke, so the drifted seam gets re-authored
# It never pushes a breaking bump to main on its own.

on:
  schedule:
    - cron: "27 */6 * * *"   # every 6 hours (off-minute); only builds when upstream actually moved
  workflow_dispatch:

concurrency:
  group: upstream-autobump
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move submodule to latest 16-dev
        id: bump
        run: |
          # Move to the branch tip via --remote (ignores the recorded pin, which may be unreachable
          # since 16-dev force-pushes; preserves submodule metadata). BEFORE is the committed
          # gitlink (read without a checkout); AFTER is the tip.
          BEFORE=$(git ls-tree HEAD upstream | awk '{print $3}')
          git submodule update --init --recursive --remote --depth=1 upstream
          AFTER=$(git -C upstream rev-parse HEAD)
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after=$AFTER" >> "$GITHUB_OUTPUT"
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already at latest ($AFTER) — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Lawnchair $BEFORE -> $AFTER"
          fi

      - name: Set up JDK 21
        if: steps.bump.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        if: steps.bump.outputs.changed == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Verify overlay applies and builds
        if: steps.bump.outputs.changed == 'true'
        id: verify
        run: |
          set +e
          overlay/apply-overlay.sh > "$GITHUB_WORKSPACE/apply.log" 2>&1
          if [ $? -ne 0 ]; then
            echo "stage=apply-overlay" >> "$GITHUB_OUTPUT"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            cat "$GITHUB_WORKSPACE/apply.log"
            exit 0
          fi
          ( cd upstream && ./gradlew assembleLawnWithQuickstepGithubDebug --build-cache ) \
            > "$GITHUB_WORKSPACE/build.log" 2>&1
          if [ $? -ne 0 ]; then
            echo "stage=build" >> "$GITHUB_OUTPUT"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            tail -c 4000 "$GITHUB_WORKSPACE/build.log"
            exit 0
          fi
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Commit verified bump to main
        if: steps.bump.outputs.changed == 'true' && steps.verify.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Verified green (overlay applied + GithubDebug built) -> push the bump straight to main.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upstream
          git commit \
            -m "chore(upstream): bump Lawnchair submodule to ${{ steps.bump.outputs.after }}" \
            -m "Auto-update from 16-dev. Overlay applied and GithubDebug built clean."
          git push origin HEAD:main

      - name: Task Jules with the drifted seam
        if: steps.bump.outputs.changed == 'true' && steps.verify.outputs.ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STAGE="${{ steps.verify.outputs.stage }}"
          if [ "$STAGE" = "apply-overlay" ]; then LOG=$(tail -c 4000 "$GITHUB_WORKSPACE/apply.log"); else LOG=$(tail -c 4000 "$GITHUB_WORKSPACE/build.log"); fi
          # Don't pile up duplicates while a bump is blocked.
          if gh issue list --state open --search "in:title Upstream bump blocked" | grep -q .; then
            echo "An open upstream-bump issue already exists; skipping."
            exit 0
          fi
          TITLE="Upstream bump blocked: Lawnchair ${{ steps.bump.outputs.after }} ($STAGE failed)"
          BODY=$(printf '@gemini-code-assist /jules re-author the drifted Lunch Heir overlay seam.\n\nAuto-update of the upstream submodule to `%s` (from `%s`) failed at **%s** — a Lawnchair change moved an exact-anchor patch in `overlay/apply_overlay.py` (or broke the GithubDebug build). Find the drifted anchor, re-author that one edit against the new upstream so the overlay applies and the GithubDebug flavor builds, then push the fix. A manual run of this workflow (or the next scheduled run) will retry the bump.\n\n```\n%s\n```' "${{ steps.bump.outputs.after }}" "${{ steps.bump.outputs.before }}" "$STAGE" "$LOG")
          # Mirror the original failure handler: assign Jules, falling back to an unassigned issue.
          gh issue create --title "$TITLE" --assignee gemini-code-assist --body "$BODY" \
            || gh issue create --title "$TITLE" --body "$BODY"

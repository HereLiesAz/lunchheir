name: Build Lunch Heir

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with upstream submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply Lunch Heir source overlay
        run: overlay/apply-overlay.sh

      - name: Assemble Lunch Heir (github debug)
        working-directory: upstream
        run: ./gradlew --init-script ../overlay/lunchheir.init.gradle assembleLawnWithQuickstepGithubDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lunchheir-github-debug
          path: upstream/build/outputs/apk/**/*.apk
          if-no-files-found: warn

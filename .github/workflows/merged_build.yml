name: Merged Build & Release

# Lunch Heir is an overlay on the upstream Lawnchair submodule, not a flat Android project:
# there is no root gradlew / app module. The real Gradle project lives in upstream/, and the
# Lunch Heir source overlay must be applied before building. This mirrors ci.yml's build path
# and additionally publishes a GitHub Release with the APKs on pushes to main.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with upstream submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply Lunch Heir source overlay
        run: overlay/apply-overlay.sh

      - name: Assemble Lunch Heir (github debug)
        working-directory: upstream
        run: ./gradlew assembleLawnWithQuickstepGithubDebug

      - name: Collect APKs
        id: collect
        run: |
          mkdir -p dist
          find upstream/build/outputs/apk -name '*.apk' -exec cp {} dist/ \;
          echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          ls -l dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lunchheir-github-debug
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.collect.outputs.build_number }}
          name: Lunch Heir debug build ${{ steps.collect.outputs.build_number }}
          files: dist/*.apk
          generate_release_notes: true
          # Debug-signed artifact -> mark as a pre-release (never "Latest").
          prerelease: true

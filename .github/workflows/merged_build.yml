name: Merged Build & Release

# Lunch Heir is an overlay on the upstream Lawnchair submodule — there is no root gradlew / app
# module. So every job checks out submodules, applies the Lunch Heir source overlay, uses JDK 21,
# and builds the GithubDebug flavor inside upstream/. Everything else mirrors the original pipeline:
# unit-test gate, optional keystore signing, build-failure issue, and a rolling debug pre-release.
#
# Versioning is owned by Gradle (overlay/lunchheir-overlay.gradle bumps version.properties on every
# build); this workflow reads that file back for the release name so it matches the APK exactly.

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# ⚡ Build on every commit; a newer run cancels an older incomplete one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token. build-and-release overrides with the scopes it needs.
permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with upstream submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          dependency-graph: disabled

      - name: Inject ARCore key (if provided)
        env:
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: echo "ARCORE_API_KEY=$ARCORE_API_KEY" >> upstream/local.properties

      - name: Apply Lunch Heir source overlay
        run: overlay/apply-overlay.sh

      - name: Run unit tests
        working-directory: upstream
        run: ./gradlew testLawnWithQuickstepGithubDebugUnitTest --continue --build-cache

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: 'upstream/**/build/reports/tests/'
          if-no-files-found: warn

  build-and-release:
    needs: unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: read

    steps:
      - name: Checkout (with upstream submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          cache-read-only: false
          dependency-graph: disabled

      - name: Inject ARCore key (if provided)
        env:
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: echo "ARCORE_API_KEY=$ARCORE_API_KEY" >> upstream/local.properties

      - name: Decode signing keystore
        env:
          KEYSTORE_RAW: ${{ secrets.KEYSTORE_RAW }}
        run: |
          # Empty secret (e.g. on a fork without access) → skip; the build then signs with the
          # default debug key rather than failing the whole CI run.
          if [ -z "$KEYSTORE_RAW" ]; then
            echo "::warning::KEYSTORE_RAW secret is empty — building with the default debug key."
            exit 0
          fi
          echo "$KEYSTORE_RAW" | base64 -d > "$GITHUB_WORKSPACE/keystore.jks"
          if [ ! -s "$GITHUB_WORKSPACE/keystore.jks" ]; then
            echo "::error::Decoded keystore is empty — KEYSTORE_RAW is not valid base64."
            exit 1
          fi
          echo "Keystore decoded ($(stat -c%s "$GITHUB_WORKSPACE/keystore.jks") bytes)"

      - name: Apply Lunch Heir source overlay
        run: overlay/apply-overlay.sh

      - name: Build with Gradle
        id: gradle-build
        working-directory: upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Consumed by the optional signingConfig in overlay/lunchheir-overlay.gradle: when the
          # keystore is present the debug build is signed with it; absent it, the default debug key.
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set +e
          # Versioning is handled in Gradle (version.properties is bumped on every build).
          ./gradlew assembleLawnWithQuickstepGithubDebug --build-cache > "$GITHUB_WORKSPACE/build.log" 2>&1
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          cat "$GITHUB_WORKSPACE/build.log"
          exit $EXIT_CODE

      # ------------------------------------------------------------------
      # FAILURE HANDLING
      # ------------------------------------------------------------------
      - name: Report Failure to Jules
        if: failure() && steps.gradle-build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let logTail = 'Log file not found.';
            try { logTail = fs.readFileSync('build.log', 'utf8').slice(-4000); } catch (e) {}

            const assignee = 'gemini-code-assist';

            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Build Failure on ${context.eventName === 'pull_request' ? 'PR #' + context.issue.number : context.ref}`,
                body: `@${assignee} /jules debug this build error\n\n**Log:**\n\`\`\`\n${logTail}\n\`\`\``,
                labels: ['jules', 'bug'],
                assignees: [assignee]
              });
            } catch (error) {
              console.log("Failed to create issue with assignee. Retrying without assignee.");
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Build Failure on ${context.eventName === 'pull_request' ? 'PR #' + context.issue.number : context.ref}`,
                body: `@${assignee} /jules debug this build error\n\n**Log:**\n\`\`\`\n${logTail}\n\`\`\``,
                labels: ['jules', 'bug']
              });
            }

      # ------------------------------------------------------------------
      # RELEASE STEPS (Only run on PUSH, not Pull Requests)
      # ------------------------------------------------------------------
      - name: Prepare Release Variables
        if: success() && github.event_name == 'push'
        id: release_vars
        run: |
          # Version is the single source of truth in version.properties, freshly bumped by the
          # Gradle build above — so the release name matches the APK's embedded version exactly.
          MAJOR=$(grep '^versionMajor=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          MINOR=$(grep '^versionMinor=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          PATCH=$(grep '^versionPatch=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          BUILD=$(grep '^versionBuild=' version.properties | cut -d'=' -f2 | tr -d '\r ')

          VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}.${BUILD}"
          # Rolling tag per minor line, so each minor keeps one updating "latest debug" release.
          TAG_NAME="latest-debug-v${MAJOR}.${MINOR}"
          APP_NAME="LunchHeir"

          # Locate the built APK (GithubDebug flavor output, under the upstream module).
          APK_ORIGINAL=$(find upstream/build/outputs/apk -name "*.apk" | head -n 1)
          if [ -z "$APK_ORIGINAL" ]; then
             echo "Error: No APK found to release!"
             exit 1
          fi

          TARGET_NAME="${APP_NAME}-${VERSION_NAME}-debug.apk"
          mv "$APK_ORIGINAL" "$TARGET_NAME"

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "APK_FILE=$TARGET_NAME" >> $GITHUB_ENV

      - name: Publish Release
        if: success() && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force the rolling tag to the current commit.
          git tag -fa "$TAG_NAME" -m "Latest Debug Build"
          git push origin "$TAG_NAME" --force

          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
             echo "Updating existing release..."
             gh release edit "$TAG_NAME" --prerelease \
               --title "Latest Debug Build ($TAG_NAME)" \
               --notes "Auto-build from commit $GITHUB_SHA" \
               --target "$GITHUB_SHA"
             # Clobber so re-running on the same commit replaces the APK instead of failing.
             gh release upload "$TAG_NAME" "$APK_FILE" --clobber
          else
             echo "Creating new release..."
             gh release create "$TAG_NAME" "$APK_FILE" --prerelease \
               --title "Latest Debug Build ($TAG_NAME)" \
               --notes "Auto-build from commit $GITHUB_SHA" \
               --target "$GITHUB_SHA"
          fi

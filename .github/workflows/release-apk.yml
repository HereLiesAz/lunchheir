name: Publish Release APK

# Deliberate release: builds the signed RELEASE apk (GithubRelease flavor), verifies its signing
# certificate against KEYSTORE_SHA256, and publishes a GitHub Release with the signed APK attached.
# Triggered manually or by pushing a v* tag — NOT on every commit (that's merged_build.yml's debug).

on:
  workflow_dispatch:
  push:
    tags: [ "v*" ]

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with upstream submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Inject ARCore key (if provided)
        env:
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: echo "ARCORE_API_KEY=$ARCORE_API_KEY" >> upstream/local.properties

      - name: Decode signing keystore (required)
        env:
          KEYSTORE_RAW: ${{ secrets.KEYSTORE_RAW }}
        run: |
          if [ -z "$KEYSTORE_RAW" ]; then
            echo "::error::KEYSTORE_RAW is not set — a release APK must be signed."
            exit 1
          fi
          echo "$KEYSTORE_RAW" | base64 -d > "$GITHUB_WORKSPACE/keystore.jks"
          if [ ! -s "$GITHUB_WORKSPACE/keystore.jks" ]; then
            echo "::error::Decoded keystore is empty — KEYSTORE_RAW is not valid base64."
            exit 1
          fi

      - name: Apply Lunch Heir source overlay
        run: overlay/apply-overlay.sh

      - name: Build signed release APK
        working-directory: upstream
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleLawnWithQuickstepGithubRelease --build-cache

      - name: Verify release signing certificate
        env:
          EXPECTED_SHA256: ${{ secrets.KEYSTORE_SHA256 }}
        run: |
          APK=$(find upstream/build/outputs/apk -name "*.apk" ! -name "*unsigned*" | head -n 1)
          if [ -z "$APK" ]; then echo "::error::No signed APK found."; exit 1; fi
          if [ -z "$EXPECTED_SHA256" ]; then
            echo "::warning::KEYSTORE_SHA256 not set — skipping signature verification."
            exit 0
          fi
          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner | sort -V | tail -n 1)
          ACTUAL=$("$APKSIGNER" verify --print-certs "$APK" | grep -i "SHA-256 digest" | head -n 1 | grep -oiE '[0-9a-fA-F]{64}')
          NORM_EXP=$(printf '%s' "$EXPECTED_SHA256" | tr -d ': \r\n' | tr 'A-F' 'a-f')
          NORM_ACT=$(printf '%s' "$ACTUAL" | tr -d ': \r\n' | tr 'A-F' 'a-f')
          echo "expected: $NORM_EXP"
          echo "actual:   $NORM_ACT"
          if [ "$NORM_EXP" != "$NORM_ACT" ]; then
            echo "::error::APK signing certificate SHA-256 does not match KEYSTORE_SHA256."
            exit 1
          fi
          echo "✅ Signature verified against KEYSTORE_SHA256."

      - name: Prepare release variables
        id: vars
        run: |
          MAJOR=$(grep '^versionMajor=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          MINOR=$(grep '^versionMinor=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          PATCH=$(grep '^versionPatch=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          BUILD=$(grep '^versionBuild=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}.${BUILD}"

          # Tag: the pushed v* tag when triggered that way, else a version tag from version.properties.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${VERSION_NAME}"
          fi

          APK=$(find upstream/build/outputs/apk -name "*.apk" ! -name "*unsigned*" | head -n 1)
          TARGET="LunchHeir-${VERSION_NAME}-release.apk"
          mv "$APK" "$TARGET"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk=$TARGET" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" "${{ steps.vars.outputs.apk }}" --clobber
          else
            gh release create "$TAG" "${{ steps.vars.outputs.apk }}" --latest \
              --title "Lunch Heir ${{ steps.vars.outputs.version }}" \
              --notes "Signed release build from commit $GITHUB_SHA" \
              --target "$GITHUB_SHA"
          fi

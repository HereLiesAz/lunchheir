name: Build Bridge

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "overlay/bridge/**"
      - ".github/workflows/bridge.yml"
  pull_request:
    paths:
      - "overlay/bridge/**"
      - ".github/workflows/bridge.yml"
  workflow_dispatch:

concurrency:
  group: bridge-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Decode signing keystore (if available)
        env:
          KEYSTORE_RAW: ${{ secrets.KEYSTORE_RAW }}
        run: |
          if [ -n "$KEYSTORE_RAW" ]; then
            echo "$KEYSTORE_RAW" | base64 -d > "$GITHUB_WORKSPACE/keystore.jks"
          fi

      - name: Build bridge APK (release, signed with the launcher key)
        working-directory: overlay/bridge
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon

      - name: Upload bridge APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: lunchheir-bridge
          path: overlay/bridge/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Publish bridge pre-release (download target)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find overlay/bridge/build/outputs/apk -name "*.apk" ! -name "*unsigned*" | head -n 1)
          if [ -z "$APK" ]; then echo "::error::No bridge APK produced."; exit 1; fi
          cp "$APK" lunchheir-bridge.apk
          NOTES="Lunch Heir Bridge — companion app for the Google Discover (\"-1\") feed. Download and install this APK yourself; the launcher trusts it by signature (same signing key). It is debuggable by design (the Google App only serves the feed to debuggable apps)."
          if gh release view bridge-latest >/dev/null 2>&1; then
            gh release edit bridge-latest --prerelease --title "Lunch Heir Bridge (latest)" --notes "$NOTES" --target "$GITHUB_SHA"
            gh release upload bridge-latest lunchheir-bridge.apk --clobber
          else
            gh release create bridge-latest lunchheir-bridge.apk --prerelease --title "Lunch Heir Bridge (latest)" --notes "$NOTES" --target "$GITHUB_SHA"
          fi

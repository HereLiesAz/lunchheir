name: Build Bridge

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "overlay/bridge/**"
      - ".github/workflows/bridge.yml"
  pull_request:
    paths:
      - "overlay/bridge/**"
      - ".github/workflows/bridge.yml"
  workflow_dispatch:

concurrency:
  group: bridge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build bridge APK (debug)
        working-directory: overlay/bridge
        run: gradle assembleDebug --no-daemon

      - name: Upload bridge APK
        uses: actions/upload-artifact@v4
        with:
          name: lunchheir-bridge-debug
          path: overlay/bridge/build/outputs/apk/**/*.apk
          if-no-files-found: warn
